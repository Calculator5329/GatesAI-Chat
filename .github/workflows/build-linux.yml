name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            curl \
            wget \
            file \
            libxdo-dev \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build stub bridge binary for Linux
        # The real bridge source lives in a separate repo. This stub satisfies
        # Tauri's externalBin requirement and keeps the app alive; workspace
        # tools will show "bridge offline" until a native Linux bridge ships.
        run: |
          mkdir -p src-tauri/binaries
          cat > /tmp/bridge_stub.c << 'EOF'
          #include <stdio.h>
          #include <unistd.h>
          int main(int argc, char *argv[]) {
            fprintf(stderr, "[gatesai-bridge-stub] Linux bridge stub — workspace tools unavailable.\n");
            fflush(stderr);
            while (1) { sleep(3600); }
            return 0;
          }
          EOF
          gcc /tmp/bridge_stub.c -o "src-tauri/binaries/gatesai-bridge-x86_64-unknown-linux-gnu"
          chmod +x "src-tauri/binaries/gatesai-bridge-x86_64-unknown-linux-gnu"

      - name: Build Tauri AppImage
        run: npx tauri build --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: GatesAI-Chat-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
