name: Build Linux AppImage

on:
  workflow_dispatch:
    inputs:
      bridge_repo:
        description: 'Optional gatesai-bridge repository, for example owner/gatesai-bridge'
        required: false
        type: string
      bridge_ref:
        description: 'Optional gatesai-bridge ref to checkout'
        required: false
        type: string
      allow_stub:
        description: 'Build a packaging-only AppImage with an offline bridge stub'
        required: false
        default: false
        type: boolean
  # Tag pushes are handled by release.yml (which also publishes a GitHub Release).
  # This workflow stays manual-only for ad-hoc AppImage artifact builds.

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout chat app
        uses: actions/checkout@v4
        with:
          path: chat

      - name: Checkout bridge source
        if: ${{ inputs.bridge_repo != '' || vars.GATESAI_BRIDGE_REPOSITORY != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bridge_repo || vars.GATESAI_BRIDGE_REPOSITORY }}
          ref: ${{ inputs.bridge_ref || vars.GATESAI_BRIDGE_REF || 'main' }}
          path: gatesai-bridge
          token: ${{ secrets.GATESAI_BRIDGE_TOKEN || github.token }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            curl \
            wget \
            file \
            libxdo-dev \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chat/src-tauri/target
            ~/.cache/tauri
          key: ${{ runner.os }}-cargo-${{ hashFiles('chat/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        working-directory: chat
        run: npm ci

      - name: Prefetch Tauri AppImage tools
        # Tauri downloads these during AppImage bundling if they are absent.
        # Prefetch with retries so transient GitHub 5xx responses do not fail
        # an otherwise successful release build.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/tauri"

          download_tool() {
            local url="$1"
            local output="$2"
            if [ -x "$output" ]; then
              echo "Using cached $(basename "$output")"
              return
            fi
            curl --fail --location --retry 8 --retry-delay 10 --retry-all-errors --connect-timeout 30 \
              --output "$output" "$url"
            chmod +x "$output"
          }

          download_tool \
            "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64" \
            "$HOME/.cache/tauri/AppRun-x86_64"
          download_tool \
            "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage" \
            "$HOME/.cache/tauri/linuxdeploy-x86_64.AppImage"
          download_tool \
            "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" \
            "$HOME/.cache/tauri/linuxdeploy-plugin-gtk.sh"

      - name: Prepare Linux bridge sidecar
        working-directory: chat
        env:
          GATESAI_BRIDGE_REPO: ${{ github.workspace }}/gatesai-bridge
          ALLOW_STUB_BRIDGE: ${{ inputs.allow_stub || 'false' }}
        run: bash scripts/prepare-linux-sidecar.sh

      - name: Build Tauri AppImage
        working-directory: chat
        run: npx tauri build --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: GatesAI-Chat-linux-appimage
          path: chat/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
