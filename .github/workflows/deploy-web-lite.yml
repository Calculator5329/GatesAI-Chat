name: Deploy Web Lite demo

# Builds the browser-only "Web Lite" variant (VITE_GATESAI_WEB=1) and publishes
# it to GitHub Pages so the UI is clickable without installing the desktop app.
# One-time setup: in repo Settings → Pages, set "Source" to "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Lite
        run: npm run build:web
        env:
          # Project Pages serve from /<repo>/, so the bundle must use that base.
          VITE_BASE: /GatesAI-Chat/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
