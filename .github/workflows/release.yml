name: Release desktop builds

# Builds the desktop installers and publishes them as GitHub Release assets so
# the in-app (Web Lite) download recommendations resolve. Push a tag like v4.1.0
# to cut a release; the asset names below are STABLE so the app can deep-link via
# https://github.com/<owner>/<repo>/releases/latest/download/<asset>.
#
# Requires repo variable GATESAI_BRIDGE_REPOSITORY (e.g. owner/gatesai-bridge),
# and GATESAI_BRIDGE_TOKEN secret if the bridge repo is private.
#
# This source repo is private, so binaries are published to the SEPARATE PUBLIC
# repo Calculator5329/GatesAI-Chat-releases (the in-app download links point
# there). Requires a RELEASES_TOKEN secret: a PAT with contents:write on the
# releases repo. Without it, the publish steps fail and no public release is cut.

on:
  workflow_dispatch:
    inputs:
      bridge_repo:
        description: 'Optional gatesai-bridge repository, for example owner/gatesai-bridge'
        required: false
        type: string
      bridge_ref:
        description: 'Optional gatesai-bridge ref to checkout'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout chat app
        uses: actions/checkout@v4
        with:
          path: chat

      - name: Checkout bridge source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bridge_repo || vars.GATESAI_BRIDGE_REPOSITORY }}
          ref: ${{ inputs.bridge_ref || vars.GATESAI_BRIDGE_REF || 'main' }}
          path: gatesai-bridge
          token: ${{ secrets.GATESAI_BRIDGE_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chat/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('chat/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        working-directory: chat
        run: npm ci

      - name: Build macOS bridge sidecar
        shell: bash
        run: |
          set -euo pipefail
          target=$(rustc -vV | sed -n 's/^host: //p')
          case "$target" in
            aarch64-apple-darwin) goarch=arm64 ;;
            x86_64-apple-darwin) goarch=amd64 ;;
            *) echo "Unsupported macOS target: $target" >&2; exit 1 ;;
          esac
          mkdir -p chat/src-tauri/binaries
          (
            cd gatesai-bridge
            GOOS=darwin GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" \
              -o "../chat/src-tauri/binaries/gatesai-bridge-$target" \
              ./cmd/gatesai-bridge
          )

      - name: Snapshot source bundle
        working-directory: chat
        run: npm run source:snapshot

      - name: Build unsigned Tauri app and DMG
        working-directory: chat
        env:
          APPLE_SIGNING_IDENTITY: '-'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles app,dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GatesAI-Chat-macos
          path: |
            chat/src-tauri/target/release/bundle/macos/*.app
            chat/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout chat app
        uses: actions/checkout@v4
        with:
          path: chat

      - name: Checkout bridge source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bridge_repo || vars.GATESAI_BRIDGE_REPOSITORY }}
          ref: ${{ inputs.bridge_ref || vars.GATESAI_BRIDGE_REF || 'main' }}
          path: gatesai-bridge
          token: ${{ secrets.GATESAI_BRIDGE_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chat/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('chat/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        working-directory: chat
        run: npm ci

      - name: Build Windows bridge sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p chat/src-tauri/binaries
          (
            cd gatesai-bridge
            GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" \
              -o "../chat/src-tauri/binaries/gatesai-bridge-x86_64-pc-windows-msvc.exe" \
              ./cmd/gatesai-bridge
          )

      - name: Snapshot source bundle
        working-directory: chat
        run: npm run source:snapshot

      - name: Build Tauri NSIS installer
        working-directory: chat
        env:
          # Signs the updater artifact so installed apps can verify updates
          # (see docs/release-checklist.md). Without the secret the build
          # still succeeds but no .sig is produced and auto-update won't fire.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis

      - name: Stage installer with stable name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          src=$(ls "chat/src-tauri/target/release/bundle/nsis/"*_x64-setup.exe | head -n1)
          cp "$src" "release-assets/GatesAI-Chat-Setup-x64.exe"
          # Updater signature (present when the signing key secret is set).
          if [ -f "$src.sig" ]; then
            cp "$src.sig" "release-assets/GatesAI-Chat-Setup-x64.exe.sig"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GatesAI-Chat-windows-setup
          path: release-assets/GatesAI-Chat-Setup-x64.exe*
          if-no-files-found: error

      - name: Publish to public releases repo
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Source is private; binaries go to the separate PUBLIC releases repo
          # so the in-app download links resolve for anonymous visitors. Needs a
          # RELEASES_TOKEN secret (PAT with contents:write on that repo).
          repository: Calculator5329/GatesAI-Chat-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/GatesAI-Chat-Setup-x64.exe*

  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout chat app
        uses: actions/checkout@v4
        with:
          path: chat

      - name: Checkout bridge source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bridge_repo || vars.GATESAI_BRIDGE_REPOSITORY }}
          ref: ${{ inputs.bridge_ref || vars.GATESAI_BRIDGE_REF || 'main' }}
          path: gatesai-bridge
          token: ${{ secrets.GATESAI_BRIDGE_TOKEN || github.token }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            curl \
            wget \
            file \
            libxdo-dev \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chat/src-tauri/target
            ~/.cache/tauri
          key: ${{ runner.os }}-cargo-${{ hashFiles('chat/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        working-directory: chat
        run: npm ci

      - name: Prefetch Tauri AppImage tools
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/tauri"
          download_tool() {
            local url="$1"; local output="$2"
            if [ -x "$output" ]; then echo "Using cached $(basename "$output")"; return; fi
            curl --fail --location --retry 8 --retry-delay 10 --retry-all-errors --connect-timeout 30 \
              --output "$output" "$url"
            chmod +x "$output"
          }
          download_tool \
            "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64" \
            "$HOME/.cache/tauri/AppRun-x86_64"
          download_tool \
            "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage" \
            "$HOME/.cache/tauri/linuxdeploy-x86_64.AppImage"
          download_tool \
            "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" \
            "$HOME/.cache/tauri/linuxdeploy-plugin-gtk.sh"

      - name: Prepare Linux bridge sidecar
        working-directory: chat
        env:
          GATESAI_BRIDGE_REPO: ${{ github.workspace }}/gatesai-bridge
        run: bash scripts/prepare-linux-sidecar.sh

      - name: Snapshot source bundle
        working-directory: chat
        run: npm run source:snapshot

      - name: Build Tauri AppImage
        working-directory: chat
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles appimage

      - name: Stage AppImage with stable name
        run: |
          set -euo pipefail
          mkdir -p release-assets
          src=$(ls chat/src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          cp "$src" "release-assets/GatesAI-Chat-x86_64.AppImage"
          if [ -f "$src.sig" ]; then
            cp "$src.sig" "release-assets/GatesAI-Chat-x86_64.AppImage.sig"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GatesAI-Chat-linux-appimage
          path: release-assets/GatesAI-Chat-x86_64.AppImage*
          if-no-files-found: error

      - name: Publish to public releases repo
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # See the windows job: binaries publish to the public releases repo.
          repository: Calculator5329/GatesAI-Chat-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/GatesAI-Chat-x86_64.AppImage*

  # Assembles the auto-updater manifest AFTER both signed platform builds
  # publish. Installed apps poll releases/latest/download/latest.json (see
  # plugins.updater in tauri.conf.json); the URLs inside pin the tag so the
  # manifest and binaries can never disagree.
  updater-manifest:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          base="https://github.com/Calculator5329/GatesAI-Chat-releases/releases/download/${tag}"
          win_sig="artifacts/GatesAI-Chat-windows-setup/GatesAI-Chat-Setup-x64.exe.sig"
          linux_sig="artifacts/GatesAI-Chat-linux-appimage/GatesAI-Chat-x86_64.AppImage.sig"
          for f in "$win_sig" "$linux_sig"; do
            if [ ! -f "$f" ]; then
              echo "Missing updater signature $f — is TAURI_SIGNING_PRIVATE_KEY set?" >&2
              exit 1
            fi
          done
          mkdir -p release-assets
          jq -n \
            --arg version "$version" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "$win_sig")" \
            --arg win_url "${base}/GatesAI-Chat-Setup-x64.exe" \
            --arg linux_sig "$(cat "$linux_sig")" \
            --arg linux_url "${base}/GatesAI-Chat-x86_64.AppImage" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url }
              }
            }' > release-assets/latest.json
          cat release-assets/latest.json

      - name: Publish manifest to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: Calculator5329/GatesAI-Chat-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/latest.json
