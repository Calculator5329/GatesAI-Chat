<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GatesAI Chat</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #050608; font-family: 'Geist', system-ui, sans-serif; color: #e7e9ee; min-height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: rgba(91,140,255,0.35); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes caret { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .editorial-stream > div:first-child { padding-top: 4px !important; }
  .stream-caret::after { content: ''; display: inline-block; width: 7px; height: 16px; margin-left: 2px; vertical-align: -2px; background: var(--accent, #5b8cff); animation: caret 1s steps(2) infinite; }
  .stage-bg { height: 100vh; width: 100vw; display: flex; background: radial-gradient(ellipse at 20% 0%, rgba(91,140,255,0.06), transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(120,110,150,0.04), transparent 60%), #050608; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
